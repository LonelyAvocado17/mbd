<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Dawg</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, sans-serif;
    overflow:hidden;
}

/* Screens */
.screen{
    position:fixed;
    width:100vw;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
    box-sizing:border-box;
}

.hidden{ display:none; }

input{
    width:80%;
    padding:12px;
    border-radius:25px;
    border:none;
    margin-top:10px;
}

button{
    margin-top:15px;
    padding:10px 25px;
    border-radius:25px;
    border:none;
    background:white;
    color:black;
    cursor:pointer;
}

.secondary{ background:gray; color:white; }

#secretText{
    margin-top:20px;
    max-width:90%;
    text-align:left;
    color:lightgreen;
    white-space:pre-wrap;
    overflow-wrap: break-word;
}

/* Running Cat */
.runningCat{
    position:absolute;
    width:90px;
    animation:runCat 25s linear infinite;
    top:10%;
}

@keyframes runCat{
    from{ left:-150px; }
    to{ left:110%; }
}

/* Floating Cats */
.cat{
    position:absolute;
    width:80px;
    opacity:0.9;
    animation:floatCat linear infinite;
}

@keyframes floatCat{
    0%{ transform:translateY(0px); }
    50%{ transform:translateY(-20px); }
    100%{ transform:translateY(0px); }
}

/* Her Video */
.herVideo{
    position:absolute;
    width:40%;
    left:50%;
    top:40%;
    transform:translate(-50%,-50%);
    z-index:5;
}

/* Chaos text beneath her video */
#chaosText{
    position:absolute;
    top:60%;
    left:50%;
    transform:translateX(-50%);
    width:90%;
    max-width:500px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:yellow;
    padding:10px;
    overflow-wrap: break-word;
    word-wrap: break-word;
    hyphens: auto;
}

/* Flash chaos effect */
.flash{
    position:fixed;
    width:100vw;
    height:100vh;
    background:white;
    opacity:0;
    pointer-events:none;
    animation:flashAnim 0.2s linear infinite;
}

@keyframes flashAnim{
    0%{ opacity:0; }
    50%{ opacity:0.08; }
    100%{ opacity:0; }
}

/* Confetti */
.confetti{
    position:absolute;
    width:10px;
    height:10px;
    pointer-events:none;
    opacity:0.9;
    border-radius:50%;
    animation:fall linear infinite;
}

@keyframes fall{
    0%{ transform:translateY(0px) rotate(0deg); }
    100%{ transform:translateY(100vh) rotate(360deg); }
}

/* Mobile font adjustment */
@media screen and (max-width: 400px){
    #chaosText{
        font-size:18px;
    }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="tap" src="tap.mp3"></audio>
<audio id="meme" src="meme.mp3"></audio>
<audio id="buri" src="buri.mp3"></audio>

<!-- SECRET MENU -->
<div id="secretMenu" class="screen">
    <h2>Access secret menu?</h2>
    <input type="password" id="codeInput" placeholder="Enter code">
    <button onclick="checkCode()">Enter</button>
    <button class="secondary" onclick="startMain()">Continue without code</button>
    <div id="secretText"></div>
</div>

<!-- MAIN SCENE -->
<div id="scene1" class="screen hidden">
    <div id="textDisplay"></div>
</div>

<script>
// Preload media
const assets = ["tap.mp3","meme.mp3","buri.mp3","pixelcat.gif","vibing cat.gif","mbd.mp4"];
assets.forEach(src=>{
    let media;
    if(src.endsWith(".mp4")) media = document.createElement("video");
    else media = new Audio();
    media.src = src;
});

// Play/pause functions
function play(id){ let s=document.getElementById(id); if(s){ s.currentTime=0; s.play(); } }
function stop(id){ let s=document.getElementById(id); if(s){ s.pause(); s.currentTime=0; } }

// Secret code check
function checkCode(){
    play("tap");
    let code = document.getElementById("codeInput").value.trim().toLowerCase();
    if(code==="labubu"){
        const secretDiv = document.getElementById("secretText");
        secretDiv.innerText = `Good job on deciphering that Caesar cipher! Now that you’re here, I want to talk about something important.

Shall I get straight to the point? Or keep yapping?
We’ll go straight to the point…

Would you like to be my girlfriend?
I really enjoy talking to you...I could listen to you for hours. I admire your curiosity and sense of humor. I know it would be long distance and that there might be some challenges, and I can’t promise everything will be perfect, but I will always try my best. I truly believe we can make it work if we both want to.

Take all the time you need to decide. By the time you read this, I’ll probably be asleep, so I’d really appreciate it if you text me and let me know what you feel after reading. No rush, just wanted to say this out.

And… that’s it. Menu closed.`;
    } else {
        alert("Wrong code");
    }
}

// Skip secret menu
function startMain(){
    play("tap");
    document.getElementById("secretMenu").classList.add("hidden");
    document.getElementById("scene1").classList.remove("hidden");
    startTimeline();
}

// Timeline before chaos
function startTimeline(){
    let text=document.getElementById("textDisplay");
    let years=20;
    let seconds=years*365*24*60*60;

    text.innerText=`Now, you have been alive for ${years} years...`;
    setTimeout(()=>{ text.innerText=`That is ${seconds.toLocaleString()} seconds...`; },3000);
    setTimeout(()=>{ text.innerText=""; startChaos(); },6000);
}

// Chaos function
function startChaos(){
    const scene=document.getElementById("scene1");
    play("meme"); play("buri");

    // Running cat
    let run=document.createElement("img");
    run.src="pixelcat.gif"; run.className="runningCat"; scene.appendChild(run);

    // Floating cats
    for(let i=0;i<20;i++){
        let cat=document.createElement("img");
        cat.src=i%2===0?"pixelcat.gif":"vibing cat.gif";
        cat.className="cat";
        cat.style.left=Math.random()*90+"%";
        cat.style.top=Math.random()*80+"%";
        cat.style.animationDuration=(3+Math.random()*3)+"s";
        scene.appendChild(cat);
    }

    // Smaller video
    let video=document.createElement("video");
    video.src="mbd.mp4"; video.className="herVideo";
    video.autoplay=true; video.loop=true; video.muted=true;
    video.playbackRate=1.5; scene.appendChild(video);

    // Chaos text
    let msg=document.createElement("div"); msg.id="chaosText"; scene.appendChild(msg);
    const chaosContent = "Okay It Was Kinda Cringe But I Had To Do It 😂";
    let index=0; let typing = setInterval(()=>{
        if(index<chaosContent.length){ msg.innerText+=chaosContent[index]; index++; }
        else clearInterval(typing);
    },100);

    // Flash
    let flash=document.createElement("div"); flash.className="flash"; document.body.appendChild(flash);

    // Confetti
    const colors=["red","yellow","blue","green","orange","pink","purple"];
    for(let i=0;i<50;i++){
        let c=document.createElement("div");
        c.className="confetti";
        c.style.left=Math.random()*100+"%";
        c.style.background=colors[Math.floor(Math.random()*colors.length)];
        c.style.animationDuration=(2+Math.random()*3)+"s";
        scene.appendChild(c);
    }

    setTimeout(()=>{ stop("meme"); stop("buri"); },13000);
    setTimeout(()=>{ scene.innerHTML=""; flash.remove(); },15000);
}
</script>

</body>
</html>
